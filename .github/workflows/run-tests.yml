name: Run Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  Kommander-Tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
      GIT_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Run Tests
        run: (cd Kommander.Tests && dotnet test -l "console;verbosity=detailed" --filter "Category!=Stress" --blame-hang --blame-hang-timeout 120s)
