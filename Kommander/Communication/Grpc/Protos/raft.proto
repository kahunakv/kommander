
syntax = "proto3";

service Rafter {
    rpc Handshake (GrpcHandshakeRequest) returns (GrpcHandshakeResponse);
    rpc Vote (GrpcVoteRequest) returns (GrpcVoteResponse);
    rpc RequestVotes (GrpcRequestVotesRequest) returns (GrpcRequestVotesResponse);
    rpc AppendLogs (GrpcAppendLogsRequest) returns (GrpcAppendLogsResponse);
    rpc CompleteAppendLogs (GrpcCompleteAppendLogsRequest) returns (GrpcCompleteAppendLogsResponse);
    rpc BatchRequests (stream GrpcBatchRequestsRequest) returns (stream GrpcBatchRequestsResponse);
    rpc Join (GrpcJoinRequest) returns (GrpcJoinResponse);
    rpc Leave (GrpcLeaveRequest) returns (GrpcLeaveResponse);
    rpc GetFollowerLag (GrpcGetFollowerLagRequest) returns (GrpcGetFollowerLagResponse);
    rpc InstallSnapshot (GrpcInstallSnapshotRequest) returns (GrpcInstallSnapshotResponse);
    rpc Gossip (GrpcGossipRequest) returns (GrpcGossipResponse);
    rpc Ping (GrpcPingRequest) returns (GrpcPingResponse);
    rpc PingReq (GrpcPingReqRequest) returns (GrpcPingReqResponse);
}

message GrpcHandshakeRequest {
    int32 NodeId = 1;
    int32 Partition = 2;
    int64 MaxLogId = 3;
    string Endpoint = 4;
}

message GrpcHandshakeResponse {
    int32 NodeId = 1;
    int64 MaxLogId = 2;
    string Endpoint = 3;
}

message GrpcVoteRequest {
    int32 Partition = 1;
    int64 Term = 2;
    int64 MaxLogId = 3;
    int32 TimeNode = 4;
    int64 TimePhysical = 5;
    uint32 TimeCounter = 6;
    string Endpoint = 7;
    bool PreVote = 8;
    // Term of the granter's last log entry (§5.4.1 freshness key). 0 from peers predating this field.
    int64 LastLogTerm = 9;
}

message GrpcVoteResponse {

}

message GrpcRequestVotesRequest {
    int32 Partition = 1;
    int64 Term = 2;
    int64 MaxLogId = 3;
    int32 TimeNode = 4;
    int64 TimePhysical = 5;
    uint32 TimeCounter = 6;
    string Endpoint = 7;
    bool PreVote = 8;
    // Term of the candidate's last log entry (§5.4.1 freshness key). 0 from peers predating this field.
    int64 LastLogTerm = 9;
}

message GrpcRequestVotesResponse {
  
}

message GrpcAppendLogsRequest {
  int32 Partition = 1;
  int64 Term = 2;
  int32 TimeNode = 3;
  int64 TimePhysical = 4;
  uint32 TimeCounter = 5;
  string Endpoint = 6;
  repeated GrpcRaftLog Logs = 7;
  // Log Matching Property anchor: index and term of the entry immediately
  // preceding this batch (0/0 when the batch starts from the beginning).
  int64 PrevLogIndex = 8;
  int64 PrevLogTerm = 9;
  // When true, this is the leader's final AppendLogs before suppressing heartbeats.
  // Receivers switch to SWIM-based election gating instead of the heartbeat timer.
  bool Quiesce = 10;
}

message GrpcAppendLogsResponse {

}

message GrpcCompleteAppendLogsRequest {
  int32 Partition = 1;
  int64 Term = 2;
  int32 TimeNode = 3;
  int64 TimePhysical = 4;
  uint32 TimeCounter = 5;
  string Endpoint = 6;
  GrpcRaftOperationStatus Status = 7;
  int64 CommitIndex = 8;
}

message GrpcCompleteAppendLogsResponse {

}

message GrpcRaftLog {
  int64 Id = 1;
  GrpcRaftLogType Type = 2;
  int64 Term = 3;
  int32 TimeNode = 4;
  int64 TimePhysical = 5;
  uint32 TimeCounter = 6;
  string LogType = 7;
  bytes Data = 8;  
}

message GrpcBatchRequestsRequest
{
  repeated GrpcBatchRequestsRequestItem Requests = 1;
}

message GrpcBatchRequestsRequestItem
{
  GrpcBatchRequestsRequestType Type = 1;
  int32 RequestId = 2;
  oneof payload {
    GrpcHandshakeRequest Handshake = 3;
    GrpcVoteRequest Vote = 4;
    GrpcRequestVotesRequest RequestVotes = 5;
    GrpcAppendLogsRequest AppendLogs = 6;
    GrpcCompleteAppendLogsRequest CompleteAppendLogs = 7;
    GrpcStepDownNoticeRequest StepDownNotice = 8;
    GrpcTransferLeadershipRequest TransferLeadership = 9;
    GrpcTransferLeadershipSuggestionRequest TransferLeadershipSuggestion = 10;
  }
}

message GrpcBatchRequestsResponse
{
  int32 RequestId = 1;
}

enum GrpcBatchRequestsRequestType {
  PING = 0;
  HANDSHAKE = 1;
  VOTE = 2;
  REQUEST_VOTES = 3;
  APPEND_LOGS = 4;
  COMPLETE_APPEND_LOGS = 5;
  STEP_DOWN_NOTICE = 6;
  TRANSFER_LEADERSHIP = 7;
  TRANSFER_LEADERSHIP_SUGGESTION = 8;
}

message GrpcStepDownNoticeRequest {
  int32 Partition = 1;
  int64 Term = 2;
  int32 TimeNode = 3;
  int64 TimePhysical = 4;
  uint32 TimeCounter = 5;
  string Endpoint = 6;
}

message GrpcTransferLeadershipRequest {
  int32 Partition = 1;
  int64 Term = 2;
  int32 TimeNode = 3;
  int64 TimePhysical = 4;
  uint32 TimeCounter = 5;
  string Endpoint = 6;
  string TargetEndpoint = 7;
}

message GrpcTransferLeadershipSuggestionRequest {
  int32 Partition = 1;
  int64 Term = 2;
  int32 TimeNode = 3;
  int64 TimePhysical = 4;
  uint32 TimeCounter = 5;
  string SuggestedBy = 6;
  string TargetEndpoint = 7;
}

message GrpcJoinRequest {
    string Endpoint = 1;
    int32 NodeId = 2;
}

message GrpcJoinResponse {
    bool Success = 1;
    string LeaderHint = 2;
    int64 MembershipVersion = 3;
}

message GrpcLeaveRequest {
    string Endpoint = 1;
    int32 NodeId = 2;
}

message GrpcLeaveResponse {
    bool Success = 1;
    string LeaderHint = 2;
    bool Terminal = 3;
}

message GrpcGetFollowerLagRequest {
    int32 PartitionId = 1;
    string FollowerEndpoint = 2;
}

message GrpcGetFollowerLagResponse {
    bool HasValue = 1;
    int64 Value = 2;
}

message GrpcInstallSnapshotRequest {
    string SessionId = 1;
    int32 PartitionId = 2;
    int64 SnapshotIndex = 3;
    string FollowerEndpoint = 4;
    int32 ChunkIndex = 5;
    bool IsLast = 6;
    bytes Data = 7;
    int32 Kind = 8; // maps to SnapshotKind; 0 == Range (default, wire-compat with old peers)
}

message GrpcInstallSnapshotResponse {
    bool Success = 1;
}

message GrpcPingRequest {
    string SenderEndpoint = 1;
}

message GrpcPingResponse {
    bool Alive = 1;
    int64 Incarnation = 2;
}

message GrpcPingReqRequest {
    string SenderEndpoint = 1;
    string TargetEndpoint = 2;
}

message GrpcPingReqResponse {
    bool Reached = 1;
}

message GrpcGossipRequest {
    string SenderEndpoint = 1;
    int64 MembershipVersion = 2;
    bytes RosterJson = 3;
    bytes LoadReportJson = 4;
}

message GrpcGossipResponse {
    int64 MembershipVersion = 1;
    bytes RosterJson = 2;
}

enum GrpcRaftLogType {
  PROPOSED = 0;
  COMMITED = 1;
  PROPOSED_CHECKPOINT = 2;
  COMMITED_CHECKPOINT = 3;
}

enum GrpcRaftOperationStatus {
  SUCCESS = 0;
  ERRORED = 1;
  NODE_IS_NOT_LEADER = 2;
  LEADER_IN_OLD_TERM = 3;
  LEADER_ALREADY_ELECTED = 4;
  LOGS_FROM_ANOTHER_LEADER = 5;
  ACTIVE_PROPOSAL = 6;
  PROPOSAL_NOT_FOUND = 7;
  PROPOSAL_TIMEOUT = 8;
  REPLICATION_FAILED = 9;
  // 10–13: Pending, ProposalQueueFull, RestoreInProgress, PartitionMoved
  PENDING = 10;
  PROPOSAL_QUEUE_FULL = 11;
  RESTORE_IN_PROGRESS = 12;
  PARTITION_MOVED = 13;
  // 14–16: dynamic-membership statuses
  STALE_MEMBERSHIP = 14;
  CONCURRENT_MEMBERSHIP_CHANGE = 15;
  INSUFFICIENT_VOTERS = 16;
  // 17–18: log catch-up / backfill statuses
  LOG_MISMATCH = 17;
  SNAPSHOT_REQUIRED = 18;
}
